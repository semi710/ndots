site_name: ndots
site_url: https://ndots.semi.sh
site_description: NixOS + nix-darwin configuration built with flakes
site_author: Nikhil Singh
repo_name: semi710/ndots
repo_url: https://github.com/semi710/ndots

theme:
  name: material
  font:
    text: Sora
    code: JetBrains Mono
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - navigation.instant
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  palette:
    - scheme: slate
      primary: deep purple
      accent: deep orange
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Modules:
      - NixOS: modules/nixos.md
      - Home: modules/home.md
      - Darwin: modules/darwin.md
      - Flake: modules/flake.md
  - Packages: packages/index.md
  - Hosts:
      - Overview: hosts/index.md
      - "mach <span class=\"nav-sub\">Laptop</span>": hosts/mach.md
      - "dsd <span class=\"nav-sub\">Work Desktop</span>": hosts/dsd.md
      - "semi <span class=\"nav-sub\">Semi-Personal</span>": hosts/semi.md
      - "obox <span class=\"nav-sub\">Oracle VPS</span>": hosts/obox.md
      - "virt <span class=\"nav-sub\">VM</span>": hosts/index.md
      - "jp-mbp <span class=\"nav-sub\">MacBook Pro</span>": hosts/jp-mbp.md
      - "anywhere <span class=\"nav-sub\">Template</span>": hosts/anywhere.md
  - Services:
      - Overview: services/index.md
      - Beszel: services/beszel.md
      - Stirling PDF: services/stirling-pdf.md
      - FileBrowser Quantum: services/filebrowser.md
      - Caddy: services/caddy.md
      - Syncthing: services/syncthing.md
      - Tailscale: services/tailscale.md
      - Docker & Podman: services/docker.md
  - Guides:
      - Installation: guides/installation.md
      - Deployment: guides/deployment.md
      - Secrets Management: guides/secrets.md
      - Building an ISO: guides/iso.md
  - Memory:
      - Context: memory/context.md
      - Decisions: memory/decisions.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/extra.js

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/semi710/ndots
  generator: false

copyright: "Made with <span style=\"color: #ff6e40\">&hearts;</span> by Nikhil · <a href=\"https://semi.sh\">semi.sh</a>"
