<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>node</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <header>
      <span class="badge">template</span>
      <h1>node</h1>
      <p class="subtitle">Ready when you are.</p>
    </header>

    <main>
      <div class="card">
        <h2>Quick Start</h2>
        <ul>
          <li>Edit <code>index.html</code> to change this page</li>
          <li>Add styles in <code>style.css</code></li>
          <li>Add logic in <code>script.js</code></li>
          <li>Run <code>just run</code> to serve</li>
        </ul>
      </div>

      <div class="card">
        <h2>Status</h2>
        <div class="status-row">
          <span class="status-label">Server</span>
          <span class="status-dot active"></span>
          <span class="status-value">Running</span>
        </div>
        <div class="status-row">
          <span class="status-label">Environment</span>
          <span class="status-value">Nix + Vite</span>
        </div>
      </div>
    </main>

    <footer>
      <button id="action-btn" class="btn">Say Hello</button>
      <p class="hint">Open DevTools to see the greeting</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
