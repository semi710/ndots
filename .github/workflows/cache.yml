name: cache

on:
  push:
    branches: [master]
    paths:
      - packages/**
      - overlays/**
      - flake.nix
      - flake.lock
  workflow_dispatch:

jobs:
  build-and-cache:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            system: x86_64-linux
          - runner: ubuntu-24.04-arm
            system: aarch64-linux
          - runner: macos-14
            system: aarch64-darwin
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            access-tokens = github.com=${{ github.token }}
            substituters = https://cache.nixos.org/ https://nix-community.cachix.org https://nvix.cachix.org https://nija.cachix.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs= nvix.cachix.org-1:qVYAfj2oiH0DF3pSs8OfPYI6B0mAZ+h5mMajN+EOL2E= nija.cachix.org-1:wJRNRxBn1M1SAgzVv5ZAMe07ky6bkSSznMH0tEOFdcA=

      - uses: cachix/cachix-action@v15
        with:
          name: nija
          authToken: ${{ secrets.NIJA_CACHIX_TOKEN }}

      - name: Build devshell and all packages
        run: |
          PACKAGES=$(nix eval --raw --apply \
            'p: builtins.concatStringsSep " " (builtins.map (n: ".#" + n) (builtins.filter (n: n != "iso") (builtins.attrNames p)))' \
            .#packages.${{ matrix.system }})

          nix build --no-link --print-out-paths \
            .#devShells.${{ matrix.system }}.default \
            $PACKAGES
